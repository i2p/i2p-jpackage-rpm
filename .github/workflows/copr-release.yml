name: COPR Release

on:
  # Manual trigger with version input
  workflow_dispatch:
    inputs:
      version:
        description: 'I2P version to build (e.g., 2.11.0)'
        required: true
        type: string

  # Poll upstream every 6 hours for new releases
  schedule:
    - cron: '0 */6 * * *'

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      should_build: ${{ steps.resolve.outputs.should_build }}

    steps:
      - name: Determine version to build
        id: resolve
        run: |
          # Extract version from tag: i2p-2.11.0 -> 2.11.0
          strip_version() {
            echo "$1" | sed -E 's/^(i2p-|v)//'
          }

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION=$(strip_version "${{ inputs.version }}")
            echo "Manual trigger: building version ${VERSION}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Scheduled run: check latest upstream release
          echo "Checking latest i2p/i2p.i2p release..."
          LATEST=$(curl -sf https://api.github.com/repos/i2p/i2p.i2p/releases/latest \
            | jq -r '.tag_name')

          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "ERROR: Could not fetch latest release tag" >&2
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Strip prefix and build suffix: i2p-2.11.0-6 -> 2.11.0
          VERSION=$(strip_version "$LATEST")
          echo "Upstream latest: ${LATEST} -> version ${VERSION}"

          # Check what COPR already has built
          echo "Checking COPR for existing builds..."
          COPR_API="https://copr.fedorainfracloud.org/api_3/package?ownername=i2porg&projectname=i2p&packagename=i2p&with_latest_succeeded_build=true"
          COPR_RAW=$(curl -s "$COPR_API")
          echo "COPR API response: ${COPR_RAW}"

          COPR_VERSION=$(echo "$COPR_RAW" \
            | jq -r '.latest_succeeded_build.source_package.version // empty' \
            | sed 's/-.*//')

          echo "COPR latest build version: ${COPR_VERSION:-none}"

          if [ -z "$COPR_VERSION" ]; then
            echo "WARNING: Could not determine COPR build version. Building to be safe."
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          elif [ "$VERSION" = "$COPR_VERSION" ]; then
            echo "Version ${VERSION} already built in COPR. Skipping."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version detected: ${VERSION} (COPR has: ${COPR_VERSION})"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-upload:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    container:
      image: fedora:41

    steps:
      - name: Install build tools
        run: |
          dnf install -y \
            rpm-build rpmdevtools \
            java-latest-openjdk-devel ant gettext \
            systemd-rpm-macros \
            curl bzip2 git \
            copr-cli

      - name: Checkout packaging repo
        uses: actions/checkout@v4

      - name: Build SRPM
        id: srpm
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          echo "Building SRPM for I2P ${VERSION}"

          chmod +x scripts/*.sh

          # Setup rpmbuild tree
          rpmdev-setuptree

          # Fetch source tarball
          ./scripts/fetch-source.sh "${VERSION}" ~/rpmbuild/SOURCES/

          # Copy packaging sources
          cp SOURCES/* ~/rpmbuild/SOURCES/
          cp SPEC/i2p.spec ~/rpmbuild/SPECS/

          # Update version in spec
          sed -i "s/^Version:.*/Version:        ${VERSION}/" ~/rpmbuild/SPECS/i2p.spec

          # Build SRPM only
          rpmbuild -bs ~/rpmbuild/SPECS/i2p.spec

          # Find the SRPM
          SRPM=$(find ~/rpmbuild/SRPMS -name "*.src.rpm" | head -1)
          echo "Built SRPM: ${SRPM}"
          echo "srpm_path=${SRPM}" >> "$GITHUB_OUTPUT"

      - name: Upload SRPM to COPR
        env:
          COPR_CONFIG: ${{ secrets.COPR_CONFIG }}
        run: |
          # Write copr-cli config
          mkdir -p ~/.config
          echo "${COPR_CONFIG}" > ~/.config/copr

          # Submit build to COPR
          echo "Uploading SRPM to COPR..."
          copr-cli build i2porg/i2p "${{ steps.srpm.outputs.srpm_path }}"

      - name: Upload SRPM artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: i2p-srpm
          path: ~/rpmbuild/SRPMS/*.src.rpm
